<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Completing sign-in&hellip;</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f2f1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 48px 40px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,.10);
      max-width: 400px;
      width: 90%;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #e1dfdd;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 22px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { margin: 0 0 10px; font-size: 20px; color: #1a1918; }
    p { margin: 0; font-size: 14px; color: #605e5c; line-height: 1.6; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h2 id="heading">Completing sign-in&hellip;</h2>
  <p id="msg">Please wait while we confirm your account.</p>
</div>
<script>
  const SERVER = "https://zengrid.space";
  const p = new URLSearchParams(window.location.search);
  const code = p.get("code"), state = p.get("state"), error = p.get("error");

  function show(color, heading, msg) {
    document.getElementById("spinner").style.display = "none";
    const h = document.getElementById("heading");
    h.textContent = heading; h.style.color = color;
    document.getElementById("msg").textContent = msg;
  }

  async function run() {
    if (error || !code || !state) {
      show("#d13438", "Sign-in failed",
        "Error: " + (error || "No authorization code received.") + " Please close this tab and try again.");
      return;
    }

    // Step 1 — fetch PKCE params (client_id, tenant, code_verifier, redirect_uri) from server
    let params;
    try {
      const pr = await fetch(SERVER + "/auth/pkce-params?state=" + encodeURIComponent(state));
      params = await pr.json();
      if (!pr.ok) { show("#d13438", "Sign-in failed", params.detail || "Session not found. Please try again."); return; }
    } catch(e) {
      show("#d13438", "Sign-in failed", "Could not reach the server. Please try again.");
      return;
    }

    // Step 2 — exchange code directly with Microsoft from browser (Origin header sent automatically)
    // This satisfies the SPA platform requirement — server-to-server calls have no Origin header.
    let tokens;
    try {
      const tr = await fetch(
        "https://login.microsoftonline.com/" + params.tenant + "/oauth2/v2.0/token",
        {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            client_id: params.client_id,
            grant_type: "authorization_code",
            code: code,
            redirect_uri: params.redirect_uri,
            code_verifier: params.code_verifier,
            scope: params.scope
          })
        }
      );
      tokens = await tr.json();
      if (!tr.ok || !tokens.access_token) {
        const errMsg = tokens.error_description || tokens.error || "Token exchange failed.";
        show("#d13438", "Sign-in failed", errMsg + " Please close this tab and try again.");
        return;
      }
    } catch(e) {
      show("#d13438", "Sign-in failed", "Could not contact Microsoft. Please try again.");
      return;
    }

    // Step 3 — send tokens to server to save the connected account
    try {
      const sr = await fetch(SERVER + "/auth/save-tokens", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ state, ...tokens })
      });
      const result = await sr.json();
      if (result.success_url) {
        window.location.href = result.success_url;
      } else if (result.ok) {
        show("#107c10", "Sign-in complete", "Your account has been linked. You can close this tab.");
      } else {
        show("#d13438", "Sign-in failed", (result.detail || "Could not save account.") + " Please close this tab and try again.");
      }
    } catch(e) {
      show("#d13438", "Sign-in failed", "Could not reach the server. Please try again.");
    }
  }

  run();
</script>
</body>
</html>
